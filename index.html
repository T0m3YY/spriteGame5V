<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja Slasher</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="P5/p5.min.js"></script>
    <script src="P5/p5.js"></script>
    <script src="P5/p5.min.js"></script>
    
    <!-- extra libraries -->
    <script src="P5/addons/p5.shape.js"></script>
    <script src="P5/addons/p5.sound.min.js"></script>


</head>

<body>

  <div id="game-container">
      <h1>Ninja Slasher</h1>
      <p>Welcome to the Ninja Slasher game!</p>
      <button onclick="startGame()">Start Game</button>

      <!-- Add any other content or elements for your landing page -->
  </div>

  <script src='sprite.js'></script>

  <button onclick="setLevel(1)">Level 1</button>
  <button onclick="setLevel(2)">Level 2</button>
  <button onclick="setLevel(3)">Level 3</button>


  <script>
    
    let gameStarted = false;
    let shouldRunGameLogic = false;

    function startGame() {
      gameStarted = true;
      setup();
      setLevel(1); // Set Level 1 immediately
    }

    function setLevel(level) {      

        const settings = {
        1: {
          levelGame: 1,
          maxVisibleEnemies: 10,
          time1ENEMY: 2000,
          time2ENEMY: 3000,
          lives: 6,
          maxLives: 6,
          speedEnemy: 4,
          bg: loadImage("spriteFotos/background1.jpg"),
        },
        2: {
          levelGame: 2,
          maxVisibleEnemies: 20,
          time1ENEMY: 900,
          time2ENEMY: 1900,
          lives: 4,
          maxLives: 4,  
          speedEnemy: 6,  
          bg: loadImage("spriteFotos/background1.jpg"),        
        },
        3: {
          levelGame: 3,
          maxVisibleEnemies: 30,
          time1ENEMY: 800,
          time2ENEMY: 1200,
          lives: 3,
          maxLives: 3,  
          speedEnemy: 90, 
          bg: loadImage("spriteFotos/background2.jpg"),
        }
        }
    

      // Update your game variables with the selected level data
      levelGame = settings[level].levelGame;
      maxVisibleEnemies = settings[level].maxVisibleEnemies;
      time1ENEMY = settings[level].time1ENEMY;
      time2ENEMY = settings[level].time2ENEMY;
      lives = settings[level].lives;
      maxLives = settings[level].maxLives;
      speedEnemy = settings[level].speedEnemy;
      bg = settings[level].bg;

      console.log(`Switched to Level ${level}`);
    }
  </script>
</body>


</html>
